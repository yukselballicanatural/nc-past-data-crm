<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natural Clinic — CRM</title>
  <script src="i18n.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
      background: #05080f;
    }

    /* ─── LEFT PANEL ─── */
    .panel-left {
      flex: 0 0 58%;
      position: relative;
      overflow: hidden;
    }
    .panel-left-img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }
    .panel-left-fallback {
      width: 100%; height: 100%;
      background: linear-gradient(145deg, #082a28 0%, #041a18 35%, #020e0c 70%, #060a16 100%);
      display: none;
    }
    .panel-left-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        100deg,
        rgba(3,7,15,0.05) 0%,
        rgba(3,7,15,0.45) 50%,
        rgba(3,7,15,0.92) 100%
      );
    }
    .panel-left-overlay-bottom {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(3,7,15,0.8) 0%,
        rgba(3,7,15,0.1) 40%,
        transparent 100%
      );
    }
    .panel-left-content {
      position: absolute;
      bottom: 52px; left: 52px; right: 52px;
    }
    .logo-hero {
      font-family: 'Cormorant Garamond', serif;
      line-height: 1;
    }
    .logo-hero-natural {
      display: block;
      font-size: 72px;
      font-weight: 300;
      color: #f7f3ec;
      letter-spacing: -1px;
    }
    .logo-hero-natural em {
      font-style: italic;
      font-weight: 300;
    }
    .logo-hero-dot {
      font-size: 72px;
      font-weight: 300;
      color: #c9a97f;
    }
    .logo-hero-clinic {
      display: block;
      font-size: 22px;
      font-weight: 400;
      color: #c9a97f;
      letter-spacing: 10px;
      margin-top: 4px;
      text-transform: lowercase;
    }
    .tagline {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.6px;
      line-height: 1.7;
      font-weight: 400;
      max-width: 320px;
    }
    .tagline-dots {
      display: flex; gap: 6px; margin-top: 20px;
    }
    .tagline-dot {
      width: 24px; height: 2px; border-radius: 2px;
      background: rgba(201,169,127,0.4);
    }
    .tagline-dot:first-child {
      width: 36px; background: rgba(201,169,127,0.8);
    }

    /* ─── RIGHT PANEL ─── */
    .panel-right {
      flex: 1;
      background: #05080f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px 40px;
      position: relative;
    }
    .panel-right::before {
      content: '';
      position: absolute;
      top: -120px; right: -100px;
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(201,169,127,0.04) 0%, transparent 65%);
      pointer-events: none;
    }
    .panel-right::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -60px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(6,105,90,0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    .right-inner {
      width: 100%;
      max-width: 340px;
      position: relative; z-index: 1;
    }

    /* Mini logo top-right */
    .logo-mini {
      display: flex; align-items: baseline; gap: 0;
      margin-bottom: 44px;
    }
    .logo-mini-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 400;
      color: #f7f3ec;
      letter-spacing: -0.5px;
    }
    .logo-mini-dot {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      color: #c9a97f;
    }
    .logo-mini-clinic {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 400;
      color: #c9a97f;
      letter-spacing: 4px;
      text-transform: lowercase;
      display: block;
      margin-top: 2px;
      margin-left: 1px;
    }
    .logo-mini-badge {
      margin-left: 12px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: rgba(201,169,127,0.5);
      background: rgba(201,169,127,0.07);
      border: 1px solid rgba(201,169,127,0.15);
      border-radius: 4px;
      padding: 3px 7px;
      text-transform: uppercase;
      align-self: center;
    }

    .welcome-title {
      font-size: 28px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .welcome-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.28);
      margin-bottom: 32px;
      font-weight: 400;
    }

    /* Fields */
    .field-group { margin-bottom: 16px; }
    .field-label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }
    .field-box {
      position: relative;
    }
    .field-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.2);
      pointer-events: none;
      display: flex;
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 13px 16px 13px 42px;
      color: #f1f5f9;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .field-input::placeholder { color: rgba(255,255,255,0.18); }
    .field-input:focus {
      border-color: rgba(201,169,127,0.4);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 0 3px rgba(201,169,127,0.07);
    }
    .pw-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.2);
      padding: 4px;
      border-radius: 6px;
      display: flex; align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .pw-toggle:hover {
      color: rgba(201,169,127,0.7);
      background: rgba(201,169,127,0.08);
    }

    /* Inline error alert */
    #alertBox {
      display: none;
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.5;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
    }

    /* Success Toast — sağ alt */
    #loginToast {
      position: fixed;
      bottom: 32px; right: 32px;
      z-index: 9999;
      width: 320px;
      background: #0d0f18;
      border: 1px solid rgba(201,169,127,0.25);
      border-radius: 16px;
      padding: 20px 20px 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,169,127,0.08);
      display: flex; gap: 14px; align-items: flex-start;
      transform: translateX(calc(100% + 48px));
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.22,1,0.36,1), opacity 0.35s ease;
      pointer-events: none;
    }
    #loginToast.show {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }
    .toast-icon-wrap {
      flex-shrink: 0;
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(201,169,127,0.1);
      border: 1px solid rgba(201,169,127,0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .toast-body { flex: 1; min-width: 0; }
    .toast-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(201,169,127,0.6);
      margin-bottom: 4px;
    }
    .toast-name {
      font-size: 15px;
      font-weight: 600;
      color: #f7f3ec;
      letter-spacing: -0.2px;
      margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .toast-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }
    .toast-progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, #c9a97f, #a8845a);
      border-radius: 0 0 16px 16px;
      width: 100%;
      transform-origin: left;
      animation: none;
    }
    @keyframes toast-drain { from { transform: scaleX(1); } to { transform: scaleX(0); } }

    /* Login button */
    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 14px 20px;
      background: linear-gradient(135deg, #c9a97f 0%, #a8845a 100%);
      border: none;
      border-radius: 12px;
      color: #0a0a0a;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(201,169,127,0.2);
    }
    .btn-login:hover {
      opacity: 0.92;
      box-shadow: 0 6px 28px rgba(201,169,127,0.32);
    }
    .btn-login:active { transform: scale(0.985); }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .divider-line {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin: 28px 0;
    }
    .admin-area {
      text-align: center;
    }
    .admin-label {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.3px;
    }
    .admin-chip {
      display: inline-block;
      margin-top: 8px;
      font-size: 10px;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(201,169,127,0.07);
      border: 1px solid rgba(201,169,127,0.15);
      color: rgba(201,169,127,0.55);
      cursor: pointer;
      transition: all 0.2s;
    }
    .admin-chip:hover {
      background: rgba(201,169,127,0.13);
      color: rgba(201,169,127,0.85);
      border-color: rgba(201,169,127,0.3);
    }

    .spinner {
      border: 2px solid rgba(0,0,0,0.15);
      border-top: 2px solid rgba(0,0,0,0.6);
      border-radius: 50%;
      width: 14px; height: 14px;
      animation: spin 0.6s linear infinite;
      display: inline-block; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 860px) {
      .panel-left { display: none; }
    }
    @media (max-width: 480px) {
      .panel-right { padding: 32px 24px; }
      #loginToast { width: calc(100% - 32px); right: 16px; bottom: 16px; }
    }
  </style>
</head>
<body>

  <!-- ════ LEFT: Building Photo ════ -->
  <div class="panel-left">
    <img
      class="panel-left-img"
      src="loginimage.png"
      alt="Natural Clinic Istanbul"
      onerror="this.style.display='none'; document.querySelector('.panel-left-fallback').style.display='block';"
    >
    <div class="panel-left-fallback"></div>
    <div class="panel-left-overlay"></div>
    <div class="panel-left-overlay-bottom"></div>
    <div class="panel-left-content">
      <div class="logo-hero">
        <span class="logo-hero-natural"><em>natural</em><span class="logo-hero-dot">.</span></span>
        <span class="logo-hero-clinic">clinic</span>
      </div>
      <p class="tagline">Advanced Hair Transplant &amp; Aesthetic Surgery Centre<br>Istanbul, Turkey</p>
      <div class="tagline-dots">
        <div class="tagline-dot"></div>
        <div class="tagline-dot"></div>
        <div class="tagline-dot"></div>
      </div>
    </div>
  </div>

  <!-- ════ RIGHT: Login Form ════ -->
  <div class="panel-right">
    <div class="right-inner">

      <h2 class="welcome-title">Welcome back</h2>
      <p class="welcome-sub">Sign in to access your dashboard</p>

      <form id="loginForm" onsubmit="return false;">

        <!-- Alert -->
        <div id="alertBox"></div>

        <!-- Username -->
        <div class="field-group">
          <label class="field-label">Username</label>
          <div class="field-box">
            <span class="field-icon">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </span>
            <input type="text" id="usernameInput" class="field-input" placeholder="Username" autocomplete="username">
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label">Password</label>
          <div class="field-box">
            <span class="field-icon">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </span>
            <input type="password" id="passwordInput" class="field-input" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px">
            <button type="button" class="pw-toggle" id="eyeBtn" onclick="togglePassword()" tabindex="-1" title="Şifreyi göster / gizle">
              <svg id="eyeOpen" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg id="eyeClosed" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="button" id="loginBtn" class="btn-login" onclick="handleLogin()">
          <span id="loginBtnText">Sign In</span>
        </button>

      </form>


    </div>
  </div>

  <!-- Success Toast -->
  <div id="loginToast">
    <div class="toast-icon-wrap">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#c9a97f" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <div class="toast-body">
      <div class="toast-label">Giriş Başarılı</div>
      <div class="toast-name" id="toastName">—</div>
      <div class="toast-sub">Dashboard'a yönlendiriliyorsunuz…</div>
    </div>
    <div class="toast-progress" id="toastProgress"></div>
  </div>

  <script>
    // Password toggle
    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const eyeOpen   = document.getElementById('eyeOpen');
      const eyeClosed = document.getElementById('eyeClosed');
      if (input.type === 'password') {
        input.type = 'text';
        eyeOpen.style.display = 'none';
        eyeClosed.style.display = 'block';
      } else {
        input.type = 'password';
        eyeOpen.style.display = 'block';
        eyeClosed.style.display = 'none';
      }
    }

    const alertBox    = document.getElementById('alertBox');
    const loginBtn    = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    function showAlert(message, type) {
      if (type === 'success') {
        showToast(message);
        return;
      }
      alertBox.style.display = 'block';
      alertBox.innerText = message;
    }

    function showToast(fullName) {
      const toast    = document.getElementById('loginToast');
      const nameEl   = document.getElementById('toastName');
      const progress = document.getElementById('toastProgress');
      nameEl.textContent = fullName;
      toast.classList.add('show');
      progress.style.animation = 'toast-drain 0.6s linear forwards';
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      if (loading) {
        loginBtnText.innerHTML = '<span class="spinner"></span>&nbsp;Checking...';
      } else {
        loginBtnText.innerText = 'Sign In';
      }
    }

    async function handleLogin() {
      const username = document.getElementById('usernameInput').value.trim();
      const password = document.getElementById('passwordInput').value;

      if (!username) { showAlert('Please enter your username.', 'error'); return; }
      if (!password) { showAlert('Please enter your password.', 'error'); return; }

      setLoading(true);

      try {
        // Kimlik doğrulama artık tarayıcıda değil, sunucuda (api/login.js,
        // service_role key ile) yapılıyor — tarayıcı Users tablosuna hiç
        // dokunmuyor, Password alanı istemciye asla gönderilmiyor. Önceden
        // burada sabit kodlu bir "admin/admin123" arka kapı şifresi vardı,
        // güvenlik açığı olduğu için kaldırıldı.
        const loginResp = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const loginData = await loginResp.json().catch(() => ({}));
        if (!loginResp.ok) {
          showAlert(loginData.error || 'Login failed.', 'error');
          setLoading(false); return;
        }

        const user = loginData.user;

        const _c = await fetch('/api/config').then(r => r.json());
        const SUPABASE_URL = _c.url;
        const SUPABASE_KEY = _c.key;

        let rawRole = String(user['Role'] || 'agent').toLowerCase().trim();
        let role = 'agent';
        if (rawRole.includes('super'))                                          role = 'super-admin';
        else if (rawRole.includes('admin'))                                     role = 'admin';
        else if (rawRole.includes('regional') || rawRole.includes('manager') || rawRole.includes('rm')) role = 'regional-manager';
        else if (rawRole.includes('leader') || rawRole.includes('tl'))          role = 'team-leader';

        const sessionUser = {
          fullName: user['Deal Owner Name'] || username,
          username: user['Username'] || username,
          role: role,
          team: user['Takim Adi'] || user['Role Name'] || '',
          id: user['Id'] || user['id'] || '',
          zoho_id: user['Id'] || '',
          // admin/super-admin girişlerinde api/login.js'in ürettiği imzalı
          // token — admin.html'in Users sayfası (api/admin-users.js) bunu
          // Authorization başlığında gönderir, aksi halde 401 alır.
          token: user['token'] || ''
        };

        sessionStorage.setItem('nc_current_user', JSON.stringify(sessionUser));
        showToast(sessionUser.fullName);

        try {
          // NOT: Önceden var olmayan bir "System_Logs" tablosuna yazıyordu —
          // istek sessizce 404 alıp yutulduğu için login kayıtları hiç
          // tutulmamıştı. Panellerin addLog()'unun kullandığı gerçek tablo
          // "Logs"; aynı alan şemasıyla oraya yazıyor.
          fetch(`${SUPABASE_URL}/rest/v1/Logs`, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json; charset=utf-8', 'Prefer': 'return=minimal' },
            body: JSON.stringify({ username: sessionUser.username, full_name: sessionUser.fullName || sessionUser.username, role: sessionUser.role, team: sessionUser.team, page: 'login', action_type: 'LOGIN', details: `${sessionUser.fullName} logged in` })
          }).catch(() => {});
        } catch(e) {}

        setTimeout(() => {
          // Login sonrası doğrudan panele değil, uygulama seçim ekranına
          // (apps.html) gidiyor — kullanıcı orada Natural Clinic'e ait
          // hangi sisteme gireceğini seçiyor.
          if (['agent','team-leader','admin','super-admin','regional-manager'].includes(role)) window.location.href = 'apps.html';
          else showAlert(`Role "${role}" is not authorized.`, 'error');
        }, 600);

      } catch (err) {
        console.error('Login error:', err);
        showAlert('Connection error: ' + (err.message || 'Unknown error'), 'error');
        setLoading(false);
      }
    }

    // Aynı sekmede zaten giriş yapılmış mı? (sessionStorage sekmeye özel —
    // yeni sekme/gizli sekmede boş gelir, her zaman login ister)
    try {
      const existing = JSON.parse(sessionStorage.getItem('nc_current_user') || 'null');
      if (existing && existing.role) {
        window.location.href = 'apps.html';
      }
    } catch(e) { sessionStorage.removeItem('nc_current_user'); }

    // Eski/geçersiz token yüzünden bir sayfa oturumu otomatik sonlandırıp
    // buraya geri gönderdiyse, kullanıcıya nedenini açıkla.
    if (new URLSearchParams(window.location.search).get('relogin') === '1') {
      showAlert('Oturumunuz zaman aşımına uğradı. Lütfen tekrar giriş yapın.', 'error');
    }
  </script>
</body>
</html>
