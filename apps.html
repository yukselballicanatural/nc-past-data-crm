<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Clinic — Uygulamalar</title>
<script src="i18n.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: #05080f;
    color: #f1f5f9;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; top: -180px; right: -140px;
    width: 560px; height: 560px;
    background: radial-gradient(circle, rgba(201,169,127,0.07) 0%, transparent 65%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; bottom: -160px; left: -120px;
    width: 460px; height: 460px;
    background: radial-gradient(circle, rgba(6,105,90,0.08) 0%, transparent 65%);
    pointer-events: none;
  }
  .grain-line {
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 100% 3px;
    pointer-events: none;
    opacity: 0.4;
  }

  /* ─── Header ─── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 48px;
    position: relative; z-index: 3;
  }
  .logo-mini-wrap { display: flex; flex-direction: column; }
  .logo-mini { display: flex; align-items: baseline; gap: 0; }
  .logo-mini-text { font-family: 'Cormorant Garamond', serif; font-size: 25px; font-weight: 400; color: #f7f3ec; letter-spacing: -0.5px; }
  .logo-mini-dot { font-family: 'Cormorant Garamond', serif; font-size: 25px; font-style: italic; color: #c9a97f; }
  .logo-mini-clinic { font-family: 'Cormorant Garamond', serif; font-size: 12px; font-weight: 400; color: #c9a97f; letter-spacing: 4px; text-transform: lowercase; display: block; margin-top: 1px; margin-left: 1px; }

  .topbar-right { display: flex; align-items: center; gap: 16px; }

  .lang-toggle {
    display: flex; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9999px; padding: 3px; gap: 2px;
  }
  .lang-toggle button {
    padding: 5px 12px; border: none; border-radius: 9999px; font-size: 10px; font-weight: 800;
    letter-spacing: 0.5px; cursor: pointer; background: transparent; color: rgba(255,255,255,0.35);
    transition: all 0.15s;
  }
  .lang-toggle button.active { background: linear-gradient(135deg, #c9a97f 0%, #a8845a 100%); color: #0a0a0a; }

  .user-area { display: flex; align-items: center; gap: 12px; padding-left: 14px; border-left: 1px solid rgba(255,255,255,0.08); }
  .user-info { text-align: right; }
  .user-name { font-size: 13px; font-weight: 600; color: #f1f5f9; letter-spacing: -0.1px; }
  .user-role { font-size: 10px; color: rgba(201,169,127,0.65); margin-top: 2px; font-weight: 600; letter-spacing: 0.3px; }
  .user-avatar {
    width: 38px; height: 38px; border-radius: 12px;
    background: linear-gradient(135deg, #c9a97f 0%, #a8845a 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: #0a0a0a;
    flex-shrink: 0;
  }
  .logout-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.4);
    font-size: 11px; font-weight: 600;
    width: 36px; height: 36px; border-radius: 10px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .logout-btn:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); color: #fca5a5; }

  /* ─── Hero ─── */
  .hero { text-align: center; padding: 40px 24px 4px; position: relative; z-index: 2; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(201,169,127,0.65);
    margin-bottom: 16px;
  }
  .hero-eyebrow::before, .hero-eyebrow::after { content: ''; width: 20px; height: 1px; background: rgba(201,169,127,0.35); }
  .hero-title {
    font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 500;
    color: #f7f3ec; letter-spacing: -0.5px;
  }
  .hero-sub { margin-top: 12px; font-size: 13.5px; color: rgba(255,255,255,0.32); letter-spacing: 0.2px; }

  /* ─── App grid ─── */
  .apps-wrap { max-width: 1140px; margin: 0 auto; padding: 44px 32px 80px; position: relative; z-index: 2; }
  .apps-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  @media (max-width: 980px) { .apps-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .apps-grid { grid-template-columns: 1fr; } }

  .app-card {
    background: linear-gradient(165deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.012) 100%);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 22px;
    padding: 30px 22px 24px;
    display: flex; flex-direction: column; align-items: flex-start; text-align: left;
    gap: 0;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), border-color 0.25s, box-shadow 0.25s, background 0.25s;
    position: relative;
    overflow: hidden;
  }
  .app-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 0%, var(--glow, rgba(201,169,127,0.1)) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .app-card:hover::before { opacity: 1; }
  .app-card:hover {
    transform: translateY(-5px);
    border-color: var(--accent-border, rgba(201,169,127,0.3));
    box-shadow: 0 22px 48px rgba(0,0,0,0.4);
  }
  .app-card.disabled { cursor: default; }
  .app-card.disabled:hover { transform: none; border-color: rgba(255,255,255,0.07); box-shadow: none; }
  .app-card.disabled .app-icon-wrap { filter: grayscale(0.5); opacity: 0.55; }
  .app-card.disabled .app-name { color: rgba(255,255,255,0.45); }
  .app-card.disabled .app-desc { color: rgba(255,255,255,0.22); }

  .app-icon-wrap {
    width: 56px; height: 56px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    position: relative; z-index: 1;
  }
  .app-name { font-size: 14.5px; font-weight: 700; color: #f1f5f9; line-height: 1.35; letter-spacing: -0.1px; position: relative; z-index: 1; }
  .app-desc { font-size: 11.5px; color: rgba(255,255,255,0.32); line-height: 1.5; margin-top: 6px; position: relative; z-index: 1; }

  .app-footer-row {
    margin-top: 20px;
    display: flex; align-items: center; justify-content: space-between; width: 100%;
    position: relative; z-index: 1;
  }
  .app-badge {
    font-size: 8.5px; font-weight: 800; letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 4px 10px; border-radius: 20px;
  }
  .app-badge.active { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); color: #4ade80; }
  .app-badge.soon { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.38); }
  .app-badge.external { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.25); color: #60a5fa; }

  .app-arrow {
    width: 26px; height: 26px; border-radius: 8px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.3);
    transition: all 0.2s;
  }
  .app-card:not(.disabled):hover .app-arrow {
    background: var(--accent-bg, #c9a97f); border-color: transparent; color: #0a0a0a; transform: translateX(2px);
  }

  .footer-note {
    text-align: center;
    font-size: 10.5px;
    color: rgba(255,255,255,0.16);
    margin-top: 56px;
    letter-spacing: 0.3px;
  }

  /* Toast for "coming soon" */
  #miniToast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    z-index: 9999;
    background: #0d0f18;
    border: 1px solid rgba(201,169,127,0.25);
    border-radius: 12px;
    padding: 13px 22px;
    font-size: 12.5px;
    font-weight: 500;
    color: #f1f5f9;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    white-space: nowrap;
  }
  #miniToast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="grain-line"></div>

  <div class="topbar">
    <div class="logo-mini-wrap">
      <div class="logo-mini">
        <span class="logo-mini-text">natural</span><span class="logo-mini-dot">.</span>
      </div>
      <span class="logo-mini-clinic">clinic</span>
    </div>
    <div class="topbar-right">
      <div class="lang-toggle" id="langToggleMount"></div>
      <div class="user-area">
        <div class="user-info">
          <div class="user-name" id="uaName">—</div>
          <div class="user-role" id="uaRole">—</div>
        </div>
        <div class="user-avatar" id="uaAvatar">—</div>
        <button class="logout-btn" onclick="logout()" title="Çıkış">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">Natural Clinic</div>
    <div class="hero-title">Uygulamalarınız</div>
    <div class="hero-sub">Devam etmek için bir uygulama seçin</div>
  </div>

  <div class="apps-wrap">
    <div class="apps-grid" id="appsGrid"></div>
    <div class="footer-note">Natural Clinic &copy; 2026 &middot; İç Sistemler Portalı</div>
  </div>

  <div id="miniToast"></div>

<script>
  const currentUser = JSON.parse(sessionStorage.getItem('nc_current_user') || 'null');
  if (!currentUser || !currentUser.role) {
    window.location.href = 'index.html';
  }

  document.getElementById('uaName').textContent = currentUser.fullName || currentUser.username || '—';
  document.getElementById('uaRole').textContent = I18N.t(({
    'agent': 'Danışman', 'team-leader': 'Takım Lideri', 'admin': 'Admin',
    'super-admin': 'Süper Admin', 'regional-manager': 'Bölge Müdürü'
  })[currentUser.role] || currentUser.role);
  document.getElementById('uaAvatar').textContent = (currentUser.fullName || currentUser.username || '?').trim().charAt(0).toUpperCase();

  function alarmSystemUrl() {
    if (currentUser.role === 'agent') return 'agent.html';
    if (currentUser.role === 'team-leader') return 'team-leader.html';
    return 'admin.html'; // admin, super-admin, regional-manager
  }

  const APPS = [
    {
      key: 'pdks',
      name: 'Natural Clinic PDKS',
      desc: 'Personel Devam Kontrol Sistemi',
      status: 'soon',
      accent: '#60a5fa',
      accentBg: 'rgba(96,165,250,0.12)',
      iconBg: 'linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%)',
      icon: `<svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#bfdbfe" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 7v5l3.5 2"/></svg>`
    },
    {
      key: 'alarm',
      name: 'Natural Clinic Takım Lideri Alarm Takip Sistemi',
      desc: 'Deal, alarm ve ekip takip paneli',
      status: 'active',
      accent: '#f87171',
      accentBg: 'rgba(248,113,113,0.12)',
      iconBg: 'linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%)',
      icon: `<svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#fecaca" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2a2 2 0 01-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>`
    },
    {
      key: 'dashboard',
      name: 'Natural Clinic Dashboard',
      desc: 'Genel performans ve raporlama',
      // Sadece admin/super-admin için aktif — takım lideri/RM'de "Yakında" görünmeye devam eder.
      status: (currentUser.role === 'admin' || currentUser.role === 'super-admin') ? 'active' : 'soon',
      url: 'https://nc-dashboards.vercel.app/login',
      sameTab: true, // ayrı sekme değil, alt domain gibi aynı sekmede açılsın
      accent: '#34d399',
      accentBg: 'rgba(52,211,153,0.12)',
      iconBg: 'linear-gradient(135deg, #059669 0%, #064e3b 100%)',
      icon: `<svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#a7f3d0" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17V9m3 8V5m3 12v-4M4 21h16"/></svg>`
    },
    {
      key: 'quality',
      name: 'Quality Training',
      desc: 'Eğitim ve kalite kontrol modülü',
      status: 'external',
      url: 'https://nc-quality-control.vercel.app/login',
      accent: '#c9a97f',
      accentBg: 'rgba(201,169,127,0.14)',
      iconBg: 'linear-gradient(135deg, #c9a97f 0%, #a8845a 100%)',
      icon: `<svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#1c1917" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l9-5v6M12 14v7m-6-4v3.2c0 .5.3.9.7 1.1C8.1 22 10 22.5 12 22.5s3.9-.5 5.3-1.2c.4-.2.7-.6.7-1.1V13"/></svg>`
    }
  ];

  const BADGE_LABEL = { active: 'Aktif', soon: 'Yakında', external: 'Harici' };
  const ARROW_ICON = `<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>`;
  const CHECK_ICON = `<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`;
  const CLOCK_ICON = `<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l2.5 1.5"/></svg>`;

  function renderApps() {
    const grid = document.getElementById('appsGrid');
    grid.innerHTML = APPS.map(a => {
      const disabled = a.status === 'soon';
      const arrowIcon = disabled ? CLOCK_ICON : (a.status === 'external' ? ARROW_ICON : CHECK_ICON);
      return `<div class="app-card${disabled ? ' disabled' : ''}" style="--glow:${a.accentBg};--accent-border:${a.accent}55;--accent-bg:${a.accent}" onclick="${disabled ? `showSoonToast('${a.name.replace(/'/g, "\\'")}')` : `openApp('${a.key}')`}">
        <div class="app-icon-wrap" style="background:${a.iconBg}">${a.icon}</div>
        <div class="app-name">${I18N.t(a.name)}</div>
        <div class="app-desc">${I18N.t(a.desc)}</div>
        <div class="app-footer-row">
          <span class="app-badge ${a.status}">${I18N.t(BADGE_LABEL[a.status])}</span>
          <span class="app-arrow">${arrowIcon}</span>
        </div>
      </div>`;
    }).join('');
  }
  renderApps();

  function openApp(key) {
    const app = APPS.find(a => a.key === key);
    if (!app) return;
    if (app.key === 'alarm') { window.location.href = alarmSystemUrl(); return; }
    if (app.url) {
      if (app.sameTab) { window.location.href = app.url; return; }
      window.open(app.url, '_blank', 'noopener');
      return;
    }
  }

  function showSoonToast(name) {
    const t = document.getElementById('miniToast');
    t.textContent = `${name} — ${I18N.t('çok yakında aktif olacak.')}`;
    t.classList.add('show');
    clearTimeout(window._soonTimer);
    window._soonTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  function logout() {
    sessionStorage.removeItem('nc_current_user');
    window.location.href = 'index.html';
  }

  // Dil değiştirme pilli (diğer panellerdeki I18N.renderToggleButton yerine
  // burada özel stil kullanıyoruz — header'daki lang-toggle kapsülüne uysun diye)
  function renderLangToggle() {
    const lang = I18N.getLang();
    document.getElementById('langToggleMount').innerHTML =
      `<button class="${lang === 'tr' ? 'active' : ''}" onclick="I18N.setLangAndReload('tr')">TR</button>` +
      `<button class="${lang === 'en' ? 'active' : ''}" onclick="I18N.setLangAndReload('en')">EN</button>`;
  }
  renderLangToggle();

  if (I18N.getLang() === 'en') I18N.translateDOM(document.body);
</script>
</body>
</html>
